<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>小红书学习提取</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>小红书学习提取</h1>
      <span class="badge" id="status-badge">准备中</span>
    </header>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>正在提取笔记内容...</p>
    </div>

    <div id="error" class="error hidden">
      <p id="error-message"></p>
    </div>

    <div id="content" class="content hidden">
      <div class="note-meta">
        <h2 id="note-title"></h2>
        <p class="meta-line" id="note-meta"></p>
      </div>

      <div class="section" id="summary-section">
        <div class="section-header">
          <h3>内容摘要</h3>
          <button id="btn-generate" class="btn-small">生成摘要</button>
        </div>
        <div id="summary-body" class="section-body">
          <p class="placeholder">点击上方按钮生成 AI 摘要</p>
        </div>
      </div>

      <div class="section">
        <h3>正文</h3>
        <div id="note-body" class="section-body"></div>
      </div>

      <div class="section" id="comments-section">
        <h3>评论区</h3>
        <div id="comments-body" class="section-body"></div>
      </div>
    </div>

    <div class="actions" id="actions">
      <button id="btn-copy" class="btn primary" disabled>复制 Markdown</button>
      <button id="btn-download" class="btn" disabled>下载文件</button>
      <button id="btn-download-video" class="btn hidden" title="下载视频文件">下载视频</button>
      <button id="btn-settings" class="btn btn-icon" title="设置">⚙️</button>
    </div>

    <div class="diag-bar">
      <button id="btn-diag" class="btn-diag" title="复制诊断日志，便于排查问题">复制诊断日志</button>
    </div>
  </div>

  <!-- 设置面板 -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <h3>设置</h3>
      <button id="btn-close-settings" class="btn-icon">✕</button>
    </div>
    <div class="settings-body">
      <label>
        Kimi API Key
        <input type="password" id="api-key" placeholder="sk-...">
      </label>
      <p class="hint">用于生成 AI 摘要，支持多模态图片理解。Key 仅存储在本地浏览器中。</p>
      <label>
        API 基础地址（可选）
        <input type="text" id="api-base" placeholder="https://api.moonshot.cn/v1">
      </label>
      <label>
        模型名称（可选）
        <input type="text" id="api-model" placeholder="kimi-latest">
      </label>
      <p class="hint">默认 kimi-latest（始终指向最新模型），如需指定版本可填写。</p>
    </div>
    <div class="settings-footer">
      <button id="btn-save-settings" class="btn primary">保存</button>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
